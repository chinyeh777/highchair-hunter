<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👶 親子友善餐廳雷達</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>select { appearance: auto; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center pt-10 px-4 pb-10">

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md h-fit">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">👶 高腳椅獵人 (Highchair Hunter)</h1>
            <p class="text-sm text-gray-500">不再踩雷！尋找捷運站周邊 800m 好去處</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="line-select" class="block text-sm font-medium text-gray-700 mb-1">1. 選擇捷運路線</label>
                <select id="line-select" class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <option value="">-- 請選擇路線 --</option>
                </select>
            </div>

            <div>
                <label for="station-select" class="block text-sm font-medium text-gray-700 mb-1">2. 選擇捷運站</label>
                <select id="station-select" class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-orange-500" disabled>
                    <option value="">-- 請先選擇路線 --</option>
                </select>
            </div>

            <button id="search-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4 shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                🔍 尋找周邊餐廳
            </button>
        </div>

        <div id="status-message" class="mt-4 text-center text-sm text-gray-600 hidden"></div>
        
        <div id="results-container" class="mt-6 hidden">
            <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-3">搜尋結果 (Top 10)</h2>
            <ul id="results-list" class="space-y-3">
                </ul>
        </div>
    </div>

    <div id="map" style="display: none;"></div>

    <script>
        const mrtData = {
            "O_line": { 
                name: "橘線 (中和新蘆線)",
                stations: [
                    { id: "O18", name: "新莊站", lat: 25.0361, lng: 121.4526 },
                    { id: "O17", name: "頭前庄站", lat: 25.0398, lng: 121.4601 },
                    { id: "O19", name: "輔大站", lat: 25.0327, lng: 121.4354 }
                ]
            },
            "BL_line": { 
                name: "藍線 (板南線)",
                stations: [
                    { id: "BL08", name: "新埔站", lat: 25.0227, lng: 121.4666 },
                    { id: "BL07", name: "板橋站", lat: 25.0133, lng: 121.4616 }
                ]
            }
        };

        const lineSelect = document.getElementById('line-select');
        const stationSelect = document.getElementById('station-select');
        const searchBtn = document.getElementById('search-btn');
        const statusMessage = document.getElementById('status-message');
        const resultsContainer = document.getElementById('results-container');
        const resultsList = document.getElementById('results-list');

        let map; // 儲存地圖實體

        // 初始化 API
        async function initMap() {
            console.log("Google Maps API (New) 載入成功！");
            // 新版 API 必須先初始化一個 map 實體
            const { Map } = await google.maps.importLibrary("maps");
            map = new Map(document.getElementById("map"), {
                center: { lat: 25.0361, lng: 121.4526 },
                zoom: 15,
                mapId: "DEMO_MAP_ID", // 新版 API 建議要有 mapId
            });
        }

        // 選單連動邏輯
        window.addEventListener('DOMContentLoaded', () => {
            for (const [lineKey, lineData] of Object.entries(mrtData)) {
                const option = document.createElement('option');
                option.value = lineKey;
                option.textContent = lineData.name;
                lineSelect.appendChild(option);
            }
        });

        lineSelect.addEventListener('change', (e) => {
            const selectedLine = e.target.value;
            stationSelect.innerHTML = '<option value="">-- 請選擇車站 --</option>';
            searchBtn.disabled = true;
            if (selectedLine) {
                stationSelect.disabled = false;
                mrtData[selectedLine].stations.forEach(station => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify({ lat: station.lat, lng: station.lng, name: station.name });
                    option.textContent = station.name;
                    stationSelect.appendChild(option);
                });
            } else {
                stationSelect.disabled = true;
            }
        });

        stationSelect.addEventListener('change', (e) => {
            searchBtn.disabled = !e.target.value;
        });

        // 核心功能：使用新版 API 搜尋
        searchBtn.addEventListener('click', async () => {
            const stationData = JSON.parse(stationSelect.value);
            
            // 更新 UI 狀態
            statusMessage.classList.remove('hidden');
            statusMessage.innerHTML = `<span class="animate-pulse">正在透過 Google (New API) 搜尋 <b>${stationData.name}</b> 周圍 800m 的餐廳...</span>`;
            resultsContainer.classList.add('hidden');
            resultsList.innerHTML = '';

            try {
                // 載入新版 Places 函式庫
                const { Place } = await google.maps.importLibrary("places");

                // 設定搜尋條件 (新版語法)
                const request = {
                    fields: ['displayName', 'rating', 'userRatingCount', 'id'],
                    locationRestriction: {
                        center: { lat: stationData.lat, lng: stationData.lng },
                        radius: 800, // 800公尺
                    },
                    includedPrimaryTypes: ['restaurant'],
                };

                // 發送請求
                const { places } = await Place.searchNearby(request);

                statusMessage.classList.add('hidden');

                if (places && places.length > 0) {
                    // 過濾評分 >= 4.0 且取前 10 名
                    const topResults = places
                        .filter(p => p.rating && p.rating >= 4.0)
                        .slice(0, 10);
                    
                    if (topResults.length === 0) {
                        statusMessage.classList.remove('hidden');
                        statusMessage.innerHTML = '周邊沒有找到評分 4.0 以上的餐廳 😢';
                        return;
                    }

                    resultsContainer.classList.remove('hidden');
                    
                    topResults.forEach(place => {
                        const li = document.createElement('li');
                        li.className = 'p-3 bg-orange-50 rounded-lg border border-orange-100 flex justify-between items-center';
                        
                        // 新版 API 抓取名稱的方式變成 place.displayName.text
                        li.innerHTML = `
                            <div>
                                <h3 class="font-bold text-gray-800">${place.displayName.text}</h3>
                                <p class="text-xs text-gray-500 mt-1">⭐ ${place.rating} (${place.userRatingCount} 則評論)</p>
                            </div>
                            <button onclick="alert('準備開發：即將掃描這家餐廳的設施與評論是否有高腳椅！')" class="text-xs bg-white border border-orange-300 text-orange-600 py-1 px-2 rounded hover:bg-orange-100 shadow-sm">
                                👶 掃描
                            </button>
                        `;
                        resultsList.appendChild(li);
                    });
                } else {
                    statusMessage.classList.remove('hidden');
                    statusMessage.innerHTML = '周邊沒有找到餐廳。';
                }

            } catch (error) {
                console.error("搜尋發生錯誤:", error);
                statusMessage.classList.remove('hidden');
                statusMessage.innerHTML = '<span class="text-red-500">搜尋失敗，請檢查 Console 報錯。</span>';
            }
        });
    </script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuaPi42W0Y4_T3r4bIPfCB7KgcphOYLUY&v=weekly&callback=initMap"></script>

</body>
</html>

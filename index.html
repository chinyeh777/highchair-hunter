<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👶 高腳椅獵人 (Highchair Hunter)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        select { appearance: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center pt-8 px-4 pb-10">

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md h-fit">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">👶 高腳椅獵人</h1>
            <p class="text-xs text-gray-500">不再踩雷！尋找捷運站周邊 800m 推車友善去處</p>
        </div>

        <div class="space-y-4">
            <div class="flex space-x-2">
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-700 mb-1">路線</label>
                    <select id="line-select" class="w-full border border-gray-300 rounded-lg p-2 text-sm text-gray-700 focus:ring-2 focus:ring-orange-500">
                        <option value="">-- 請選擇 --</option>
                    </select>
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-700 mb-1">車站</label>
                    <select id="station-select" class="w-full border border-gray-300 rounded-lg p-2 text-sm text-gray-700 focus:ring-2 focus:ring-orange-500" disabled>
                        <option value="">-- 選擇車站 --</option>
                    </select>
                </div>
            </div>

            <button id="search-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed" disabled>
                🔍 尋找周邊餐廳
            </button>
        </div>

        <div id="status-message" class="mt-4 text-center text-sm text-gray-600 hidden"></div>
        
        <div id="results-section" class="mt-6 hidden">
            
            <div class="bg-orange-50 p-3 rounded-lg border border-orange-100 mb-4 space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-medium text-gray-700">排序方式：</label>
                    <select id="sort-select" class="border border-gray-300 rounded text-sm p-1 text-gray-700 focus:outline-none">
                        <option value="distance">📍 距離 (近到遠)</option>
                        <option value="rating">⭐ 評分 (高到低)</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="stroller-filter" class="w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500">
                    <label for="stroller-filter" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">
                        只顯示有「🦽 推車友善」的店家
                    </label>
                </div>
            </div>

            <div class="flex border-b border-gray-200 mb-4">
                <button id="tab-list" class="w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500">📋 清單模式</button>
                <button id="tab-map" class="w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700">🗺️ 地圖模式</button>
            </div>

            <div id="view-list" class="max-h-96 overflow-y-auto no-scrollbar pb-2">
                <ul id="results-list" class="space-y-3"></ul>
            </div>

            <div id="view-map" class="hidden">
                <div id="map-container" class="w-full h-80 rounded-lg shadow-inner border border-gray-200"></div>
                <p class="text-xs text-gray-400 text-center mt-2">點擊地圖上的標記可開啟 Google Maps 導航</p>
            </div>
            
        </div>
    </div>

    <script>
        const mrtData = {
            "O_line": { 
                name: "橘線 (中和新蘆線)",
                stations: [
                    { id: "O18", name: "新莊站", lat: 25.0361, lng: 121.4526 },
                    { id: "O17", name: "頭前庄站", lat: 25.0398, lng: 121.4601 },
                    { id: "O19", name: "輔大站", lat: 25.0327, lng: 121.4354 }
                ]
            },
            "BL_line": { 
                name: "藍線 (板南線)",
                stations: [
                    { id: "BL08", name: "新埔站", lat: 25.0227, lng: 121.4666 },
                    { id: "BL07", name: "板橋站", lat: 25.0133, lng: 121.4616 }
                ]
            }
        };

        const lineSelect = document.getElementById('line-select');
        const stationSelect = document.getElementById('station-select');
        const searchBtn = document.getElementById('search-btn');
        const statusMessage = document.getElementById('status-message');
        const resultsSection = document.getElementById('results-section');
        const resultsList = document.getElementById('results-list');
        const sortSelect = document.getElementById('sort-select');
        const strollerFilter = document.getElementById('stroller-filter');
        
        const tabList = document.getElementById('tab-list');
        const tabMap = document.getElementById('tab-map');
        const viewList = document.getElementById('view-list');
        const viewMap = document.getElementById('view-map');
        const mapContainer = document.getElementById('map-container');

        let fetchedPlaces = []; 
        let currentStation = null;
        let map;
        let markers = [];

        async function initMap() {
            console.log("Google Maps API 載入準備完成！");
        }

        // 選單連動邏輯
        window.addEventListener('DOMContentLoaded', () => {
            for (const [lineKey, lineData] of Object.entries(mrtData)) {
                const option = document.createElement('option');
                option.value = lineKey;
                option.textContent = lineData.name;
                lineSelect.appendChild(option);
            }
        });

        lineSelect.addEventListener('change', (e) => {
            stationSelect.innerHTML = '<option value="">-- 選擇車站 --</option>';
            searchBtn.disabled = true;
            if (e.target.value) {
                stationSelect.disabled = false;
                mrtData[e.target.value].stations.forEach(station => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify(station);
                    option.textContent = station.name;
                    stationSelect.appendChild(option);
                });
            } else {
                stationSelect.disabled = true;
            }
        });

        stationSelect.addEventListener('change', (e) => {
            searchBtn.disabled = !e.target.value;
        });

        // 視圖切換邏輯
        tabList.addEventListener('click', () => {
            tabList.className = "w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            tabMap.className = "w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700 border-b border-transparent";
            viewList.classList.remove('hidden');
            viewMap.classList.add('hidden');
        });

        tabMap.addEventListener('click', async () => {
            tabMap.className = "w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            tabList.className = "w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700 border-b border-transparent";
            viewMap.classList.remove('hidden');
            viewList.classList.add('hidden');
            
            if (!map && currentStation) {
                const { Map } = await google.maps.importLibrary("maps");
                map = new Map(mapContainer, {
                    center: { lat: currentStation.lat, lng: currentStation.lng },
                    zoom: 15,
                    mapId: "DEMO_MAP_ID",
                });
                renderMapMarkers();
            }
        });

        // 核心搜尋邏輯
        searchBtn.addEventListener('click', async () => {
            currentStation = JSON.parse(stationSelect.value);
            statusMessage.classList.remove('hidden');
            statusMessage.innerHTML = `<span class="animate-pulse">正在搜尋 <b>${currentStation.name}</b> 周圍 800m 的餐廳...</span>`;
            resultsSection.classList.add('hidden');
            if(map) map = null; 

            try {
                const { Place } = await google.maps.importLibrary("places");
                const { spherical } = await google.maps.importLibrary("geometry"); 

                const request = {
                    // 【修復點】：移除了 googleMapsUri 欄位要求，以免 Google 報錯 Unknown fields requested
                    fields: ['displayName', 'rating', 'userRatingCount', 'id', 'location', 'accessibilityOptions'],
                    locationRestriction: {
                        center: { lat: currentStation.lat, lng: currentStation.lng },
                        radius: 800, 
                    },
                    includedPrimaryTypes: ['restaurant'],
                };

                const { places } = await Place.searchNearby(request);

                if (places && places.length > 0) {
                    const stationLatLng = new google.maps.LatLng(currentStation.lat, currentStation.lng);
                    
                    fetchedPlaces = places
                        .filter(p => p.rating && p.rating >= 3.8) 
                        .map(p => {
                            const distance = spherical.computeDistanceBetween(stationLatLng, p.location);
                            
                            let isStrollerFriendly = false;
                            if (p.accessibilityOptions && p.accessibilityOptions.wheelchairAccessibleEntrance === true) {
                                isStrollerFriendly = true;
                            }

                            // 【修復點】：既然抓不到 googleMapsUri，我們手動拼接一個通用搜尋連結。
                            // 格式：搜尋 該餐廳名字 + 該餐廳座標 (確保精準定位)
                            const rName = p.displayName ? p.displayName.text : '未知餐廳';
                            const encodedName = encodeURIComponent(rName);
                            const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodedName}&ll=${p.location.lat()},${p.location.lng()}&query_place_id=${p.id}`;

                            return {
                                name: rName,
                                rating: p.rating,
                                reviews: p.userRatingCount,
                                isStrollerFriendly: isStrollerFriendly,
                                distance: Math.round(distance), 
                                url: navUrl,
                                location: p.location
                            };
                        });

                    statusMessage.classList.add('hidden');
                    resultsSection.classList.remove('hidden');
                    
                    tabList.click();
                    updateUI(); 
                } else {
                    statusMessage.innerHTML = '周邊沒有找到合適的餐廳 😢';
                }

            } catch (error) {
                console.error("API 錯誤:", error);
                // 提供更直觀的報錯提示給用戶
                if (error.message && error.message.includes('googleMapsUri')) {
                    statusMessage.innerHTML = `<span class="text-red-500">Google API 限制：無法批量獲取導航連結。已移除該要求。請重新搜尋一次試試看。</span>`;
                } else {
                    statusMessage.innerHTML = `<span class="text-red-500">搜尋失敗，請檢查 API Key 是否受限： ${error.message}</span>`;
                }
            }
        });

        sortSelect.addEventListener('change', updateUI);
        strollerFilter.addEventListener('change', updateUI);

        function updateUI() {
            let displayPlaces = fetchedPlaces;
            
            if (strollerFilter.checked) {
                displayPlaces = displayPlaces.filter(p => p.isStrollerFriendly);
            }

            const sortMode = sortSelect.value;
            if (sortMode === 'distance') {
                displayPlaces.sort((a, b) => a.distance - b.distance); 
            } else if (sortMode === 'rating') {
                displayPlaces.sort((a, b) => b.rating - a.rating); 
            }

            resultsList.innerHTML = '';
            if (displayPlaces.length === 0) {
                resultsList.innerHTML = '<li class="text-center text-gray-500 py-4">沒有符合條件的餐廳。</li>';
            } else {
                displayPlaces.forEach(place => {
                    const li = document.createElement('li');
                    li.className = 'p-3 bg-white rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition cursor-pointer flex justify-between items-start';
                    li.onclick = () => window.open(place.url, '_blank');
                    
                    const badgeHTML = place.isStrollerFriendly 
                        ? `<span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">🦽 推車友善 (無階梯)</span>` 
                        : `<span class="inline-block mt-1 text-xs text-gray-400">未標記無障礙設施</span>`;

                    li.innerHTML = `
                        <div class="w-3/4 pr-2">
                            <h3 class="font-bold text-gray-800 text-[15px] truncate">${place.name}</h3>
                            <p class="text-xs text-gray-500 mt-1">⭐ ${place.rating} (${place.reviews})</p>
                            ${badgeHTML}
                        </div>
                        <div class="w-1/4 text-right flex flex-col justify-between items-end h-full">
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">📍 ${place.distance}m</span>
                            <span class="text-[10px] text-gray-400 mt-2">點擊導航 ↗</span>
                        </div>
                    `;
                    resultsList.appendChild(li);
                });
            }

            if (map) renderMapMarkers(displayPlaces);
        }

        async function renderMapMarkers(placesToRender = fetchedPlaces) {
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            
            markers.forEach(m => m.map = null);
            markers = [];

            placesToRender.forEach(place => {
                const marker = new AdvancedMarkerElement({
                    map: map,
                    position: place.location,
                    title: place.name,
                });
                
                marker.addListener('click', () => {
                    window.open(place.url, '_blank');
                });
                markers.push(marker);
            });
        }
    </script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBYHMT53Z_gdmseYHxqdIBrlE_4qouMDzM&v=weekly&libraries=places,geometry,marker&callback=initMap"></script>

</body>
</html>

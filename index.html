<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👶 高腳椅獵人 (Highchair Hunter)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        select { appearance: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gm-style-iw-c { padding: 12px !important; border-radius: 12px !important; }
        .gm-style-iw-d { overflow: hidden !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center pt-8 px-4 pb-10">

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md h-fit">
        
        <div class="text-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">👶 高腳椅獵人</h1>
            <p class="text-xs text-gray-500">不再踩雷！精準篩選捷運站周邊親子去處</p>
        </div>

        <div class="space-y-3 bg-gray-50 p-4 rounded-xl border border-gray-100">
            <div class="flex space-x-2">
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-700 mb-1">捷運路線</label>
                    <select id="line-select" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-orange-500 bg-white">
                        <option value="">-- 請選擇 --</option>
                    </select>
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-700 mb-1">目標車站</label>
                    <select id="station-select" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-orange-500 bg-white" disabled>
                        <option value="">-- 選擇車站 --</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 pt-2 border-t border-gray-200">
                <div>
                    <label class="block text-[10px] font-medium text-gray-500 mb-1">步行距離</label>
                    <select id="radius-select" class="w-full border border-gray-300 rounded p-1.5 text-xs bg-white">
                        <option value="400">約 5 分鐘</option>
                        <option value="800" selected>約 10 分鐘</option>
                        <option value="1200">約 15 分鐘</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-medium text-gray-500 mb-1">最低評分</label>
                    <select id="min-rating-select" class="w-full border border-gray-300 rounded p-1.5 text-xs bg-white">
                        <option value="3.8">3.8 星以上</option>
                        <option value="4.0" selected>4.0 星以上</option>
                        <option value="4.2">4.2 星以上</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-medium text-gray-500 mb-1">最少評論數</label>
                    <select id="min-reviews-select" class="w-full border border-gray-300 rounded p-1.5 text-xs bg-white">
                        <option value="10">10+ (極限)</option>
                        <option value="50" selected>50+ (推薦)</option>
                        <option value="100">100+ (老店)</option>
                        <option value="500">500+ (熱門)</option>
                    </select>
                </div>
            </div>

            <button id="search-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed mt-2" disabled>
                🔍 尋找達標餐廳
            </button>
        </div>

        <div id="status-message" class="mt-4 text-center text-sm text-gray-600 hidden"></div>
        
        <div id="results-section" class="mt-6 hidden">
            <div class="bg-orange-50 p-3 rounded-lg border border-orange-100 mb-4 space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-medium text-gray-700">清單排序：</label>
                    <select id="sort-select" class="border border-gray-300 rounded text-sm p-1 text-gray-700 focus:outline-none bg-white">
                        <option value="distance">📍 距離 (近到遠)</option>
                        <option value="rating">⭐ 評分 (高到低)</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="kids-filter" class="w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500">
                    <label for="kids-filter" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">
                        只看「👶 有高腳椅/適合兒童」店家
                    </label>
                </div>
            </div>

            <div class="flex border-b border-gray-200 mb-4">
                <button id="tab-list" class="w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500">📋 清單模式</button>
                <button id="tab-map" class="w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700">🗺️ 地圖模式</button>
            </div>

            <div id="view-list" class="max-h-[450px] overflow-y-auto no-scrollbar pb-2">
                <ul id="results-list" class="space-y-3"></ul>
                
                <div id="load-more-container" class="text-center mt-5 mb-2 hidden">
                    <button id="load-more-btn" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-6 rounded-full text-sm transition shadow-sm">
                        ⬇️ 載入更多餐廳
                    </button>
                    <p id="no-more-text" class="text-xs text-gray-400 mt-2 hidden">沒有更多符合條件的餐廳了</p>
                </div>
            </div>

            <div id="view-map" class="hidden">
                <div id="map-container" class="w-full h-[350px] rounded-lg shadow-inner border border-gray-200 bg-gray-100"></div>
                <p class="text-[10px] text-gray-400 text-center mt-2">點擊地圖上的標記可查看資訊與導航</p>
            </div>
            
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBYHMT53Z_gdmseYHxqdIBrlE_4qouMDzM'; 

        const mrtData = {
            "O_line": { 
                name: "橘線 (中和新蘆線)",
                stations: [
                    { id: "O18", name: "新莊站", lat: 25.0361, lng: 121.4526 },
                    { id: "O17", name: "頭前庄站", lat: 25.0398, lng: 121.4601 },
                    { id: "O19", name: "輔大站", lat: 25.0327, lng: 121.4354 }
                ]
            },
            "BL_line": { 
                name: "藍線 (板南線)",
                stations: [
                    { id: "BL08", name: "新埔站", lat: 25.0227, lng: 121.4666 },
                    { id: "BL07", name: "板橋站", lat: 25.0133, lng: 121.4616 }
                ]
            }
        };

        const lineSelect = document.getElementById('line-select');
        const stationSelect = document.getElementById('station-select');
        const radiusSelect = document.getElementById('radius-select');
        const minRatingSelect = document.getElementById('min-rating-select');
        const minReviewsSelect = document.getElementById('min-reviews-select');
        
        const searchBtn = document.getElementById('search-btn');
        const statusMessage = document.getElementById('status-message');
        const resultsSection = document.getElementById('results-section');
        const resultsList = document.getElementById('results-list');
        const sortSelect = document.getElementById('sort-select');
        const kidsFilter = document.getElementById('kids-filter');
        
        const loadMoreContainer = document.getElementById('load-more-container');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const noMoreText = document.getElementById('no-more-text');

        const tabList = document.getElementById('tab-list');
        const tabMap = document.getElementById('tab-map');
        const viewList = document.getElementById('view-list');
        const viewMap = document.getElementById('view-map');
        const mapContainer = document.getElementById('map-container');

        let fetchedPlaces = []; 
        let filteredAndSortedPlaces = []; 
        let currentlyDisplayedPlaces = [];
        let displayIndex = 0;             
        const PAGE_SIZE = 10;             

        let currentStation = null;
        let map;
        let markers = [];
        let mapLoaded = false;
        let infoWindow; 

        // 【終極修復】：雙重保險選單載入機制，確保 GitHub IDE 絕對不會漏接
        function initDropdowns() {
            if (lineSelect.options.length > 1) return; // 避免重複加入
            for (const [lineKey, lineData] of Object.entries(mrtData)) {
                const option = document.createElement('option');
                option.value = lineKey;
                option.textContent = lineData.name;
                lineSelect.appendChild(option);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initDropdowns);
        } else {
            initDropdowns();
        }

        async function initMap() {
            console.log("Google Maps API 載入成功！");
        }

        // 選單連動邏輯
        lineSelect.addEventListener('change', (e) => {
            stationSelect.innerHTML = '<option value="">-- 選擇車站 --</option>';
            searchBtn.disabled = true;
            if (e.target.value) {
                stationSelect.disabled = false;
                mrtData[e.target.value].stations.forEach(station => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify(station);
                    option.textContent = station.name;
                    stationSelect.appendChild(option);
                });
            } else {
                stationSelect.disabled = true;
            }
        });

        stationSelect.addEventListener('change', (e) => {
            searchBtn.disabled = !e.target.value;
        });

        tabList.addEventListener('click', () => {
            tabList.className = "w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            tabMap.className = "w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700 border-b border-transparent";
            viewList.classList.remove('hidden');
            viewMap.classList.add('hidden');
        });

        tabMap.addEventListener('click', async () => {
            tabMap.className = "w-1/2 py-2 text-center text-sm font-bold text-orange-600 border-b-2 border-orange-500";
            tabList.className = "w-1/2 py-2 text-center text-sm font-medium text-gray-500 hover:text-gray-700 border-b border-transparent";
            viewMap.classList.remove('hidden');
            viewList.classList.add('hidden');
            
            if (!mapLoaded && currentStation) {
                const { Map, InfoWindow } = await google.maps.importLibrary("maps");
                mapContainer.style.height = '350px'; 
                map = new Map(mapContainer, {
                    center: { lat: currentStation.lat, lng: currentStation.lng },
                    zoom: 15,
                    mapId: "DEMO_MAP_ID",
                });
                infoWindow = new InfoWindow(); 
                renderMapMarkers(currentlyDisplayedPlaces);
                mapLoaded = true;
            }
        });

        // 核心搜尋邏輯
        searchBtn.addEventListener('click', async () => {
            currentStation = JSON.parse(stationSelect.value);
            const radiusParam = Number(radiusSelect.value);
            const minRatingParam = parseFloat(minRatingSelect.value);
            const minReviewsParam = parseInt(minReviewsSelect.value);

            statusMessage.classList.remove('hidden');
            statusMessage.innerHTML = `<span class="animate-pulse">正在廣搜 <b>${currentStation.name}</b> 周圍的店家...</span>`;
            resultsSection.classList.add('hidden');
            mapLoaded = false; 

            try {
                const { Place } = await google.maps.importLibrary("places");
                const { spherical } = await google.maps.importLibrary("geometry"); 

                const searchRequest = {
                    fields: ['displayName', 'rating', 'userRatingCount', 'id', 'location'],
                    locationRestriction: {
                        center: { lat: currentStation.lat, lng: currentStation.lng },
                        radius: radiusParam, 
                    },
                    includedPrimaryTypes: ['restaurant', 'cafe', 'fast_food_restaurant', 'coffee_shop', 'brunch_restaurant'],
                    maxResultCount: 20 
                };

                const { places } = await Place.searchNearby(searchRequest);

                if (places && places.length > 0) {
                    const stationLatLng = new google.maps.LatLng(currentStation.lat, currentStation.lng);
                    
                    const basePlaces = places.filter(p => {
                        return p.rating && p.rating >= minRatingParam && 
                               p.userRatingCount && p.userRatingCount >= minReviewsParam;
                    });

                    if (basePlaces.length === 0) {
                        statusMessage.innerHTML = `周邊有店家，但沒有符合條件的 😢<br><span class="text-xs text-gray-400">請試著擴大步行距離或降低標準看看。</span>`;
                        return;
                    }

                    statusMessage.innerHTML = `<span class="animate-pulse">初步篩選出 ${basePlaces.length} 家優質店家，正在啟動黑魔法掃描兒童設施...</span>`;

                    const detailsPromises = basePlaces.map(async (place) => {
                        let isKidsFriendly = false;
                        
                        try {
                            const response = await fetch(`https://places.googleapis.com/v1/places/${place.id}?fields=goodForChildren,menuForChildren&key=${API_KEY}`);
                            if (response.ok) {
                                const data = await response.json();
                                if (data.goodForChildren === true || data.menuForChildren === true) {
                                    isKidsFriendly = true;
                                }
                            }
                        } catch (restError) {
                            console.warn(`REST API 抓取失敗:`, restError);
                        }
                        
                        const distance = spherical.computeDistanceBetween(stationLatLng, place.location);
                        
                        const safeName = place.displayName?.text || '未知餐廳';
                        // 【終極修復】：使用 Google 官方 Universal Search 網址，手機 100% 導向正確店家
                        const officialMapUrl = `https://www.google.com/maps/search/?api=1&query=${place.location.lat()},${place.location.lng()}&query_place_id=${place.id}`;

                        return {
                            name: safeName,
                            rating: place.rating,
                            reviews: place.userRatingCount,
                            isKidsFriendly: isKidsFriendly,
                            distance: Math.round(distance), 
                            url: officialMapUrl,
                            location: place.location
                        };
                    });

                    fetchedPlaces = await Promise.all(detailsPromises);

                    statusMessage.classList.add('hidden');
                    resultsSection.classList.remove('hidden');
                    
                    tabList.click(); 
                    applyFiltersAndSort();
                } else {
                    statusMessage.innerHTML = '周邊沒有找到任何餐廳 😢';
                }

            } catch (error) {
                console.error("API 錯誤:", error);
                statusMessage.innerHTML = `<span class="text-red-500">系統發生錯誤！請確認網路連線或 API 狀態。</span>`;
            }
        });

        sortSelect.addEventListener('change', applyFiltersAndSort);
        kidsFilter.addEventListener('change', applyFiltersAndSort);

        function applyFiltersAndSort() {
            filteredAndSortedPlaces = [...fetchedPlaces];
            
            if (kidsFilter.checked) {
                filteredAndSortedPlaces = filteredAndSortedPlaces.filter(p => p.isKidsFriendly);
            }

            const sortMode = sortSelect.value;
            if (sortMode === 'distance') {
                filteredAndSortedPlaces.sort((a, b) => a.distance - b.distance); 
            } else if (sortMode === 'rating') {
                filteredAndSortedPlaces.sort((a, b) => b.rating - a.rating); 
            }

            displayIndex = 0;
            currentlyDisplayedPlaces = [];
            resultsList.innerHTML = '';
            
            if (filteredAndSortedPlaces.length === 0) {
                loadMoreContainer.classList.add('hidden');
                resultsList.innerHTML = '<li class="text-center text-gray-500 py-4 border border-dashed rounded-lg bg-gray-50">沒有符合條件的店家。<br><span class="text-[10px] mt-1 block">請嘗試關閉篩選器，或放寬搜尋條件。</span></li>';
                if (map && mapLoaded) renderMapMarkers([]);
            } else {
                loadMoreContainer.classList.remove('hidden');
                renderNextPage();
            }
        }

        function renderNextPage() {
            const nextBatch = filteredAndSortedPlaces.slice(displayIndex, displayIndex + PAGE_SIZE);
            
            nextBatch.forEach(place => {
                currentlyDisplayedPlaces.push(place
